obsidian_log_environment: iMac
obsidian_log_config_path: skills/msty_tracker/config.yaml
obsidian_log_command_used: python -c "from openclaw.skills.msty_tracker.skill import MstyTrackerSkill; print(MstyTrackerSkill(config_path='openclaw/skills/msty_tracker/config.yaml').run())"
