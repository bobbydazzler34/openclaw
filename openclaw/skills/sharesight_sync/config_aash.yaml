# Sharesight sync — Aash / Charles Schwab workbook + second portfolio.
# Set portfolio_name to the exact name shown in Sharesight (or use dry_run: true first).
enabled: true
api_base_url: https://api.sharesight.com/api/v2
token_url: https://api.sharesight.com/oauth2/token
portfolio_name: Aash Charles Schwab
excel_path_env_var: OPENCLAW_SHARESIGHT_SYNC_EXCEL_PATH
excel_path: ~/OneDrive/Documents/AashFinance/AashCharlesSchwab.xlsx
worksheet_name: CS FY2627
client_id_env: SHARESIGHT_CLIENT_ID
client_secret_env: SHARESIGHT_CLIENT_SECRET
dry_run: false
update_existing_payouts_by_id: false # Set to true when you want to update existing payouts by ID.  False to create new payouts.
tax_field_name: non_resident_withholding_tax
confirmed_state: confirmed
unconfirmed_state: unconfirmed
obsidian_log_enabled: true
obsidian_log_dir: ~/OneDrive/obsidian/OpenClawVault/3_Logs/sharesight_sync/aashd
obsidian_log_user: aashd
obsidian_log_operator: Chris Cropley
obsidian_log_environment: iMac
obsidian_log_config_path: skills/sharesight_sync/config_aash.yaml
obsidian_log_command_used: python -c "from openclaw.skills.sharesight_sync.skill import SharesightSyncSkill; print(SharesightSyncSkill(config_path='openclaw/skills/sharesight_sync/config_aash.yaml').run())"
